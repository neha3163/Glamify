<!DOCTYPE html>
<html>
<head>

<title>Empty Bag</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: linear-gradient(135deg, #fff0f5, #fde8f0, #fff5f8);
}


.header{
  display:flex;
  align-items:center;
  padding:18px 20px;
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.back{
  font-size:24px;
  cursor:pointer;
  margin-right:12px;
}

.title{
  font-size:22px;
  font-weight:bold;
}


.container{
  height:calc(100vh - 70px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.bag{
  width:180px;
  height:180px;
  background: linear-gradient(135deg,#ffd6e7,#fbb1d3);
  border-radius:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:80px;
  margin-bottom:30px;
  box-shadow:0 10px 40px rgba(232,53,122,0.2);
}

h1{
  font-size:34px;
  margin-bottom:15px;
  line-height:1.3;
  color:#1a0012;
}

p{
  color:#6b4a5a;
  font-size:16px;
  margin-bottom:30px;
  max-width:300px;
}


button{
  background: linear-gradient(135deg,#e60073,#ff2d8d);
  color:white;
  border:none;
  padding:16px 40px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 8px 25px rgba(232,53,122,0.4);
}

button:hover{
  transform:translateY(-2px);
}
</style>
</head>

<body>
<div class="header">
  <div class="back" onclick="goBack()">←</div>
  <div class="title">Bag</div>
</div>


<div class="container">

  <div class="bag">🛍️</div>
  <h1>Your Shopping<br>Bag is Empty</h1>
  <p>This feels too light! Go on, add all your favourites</p>
  <button id="shopBtn">Start Shopping</button>

<script>
document.getElementById("shopBtn").addEventListener("click", function(){
  window.location.href = "index.html";
});
</script>

  
</div>

</body>
<script src="cart.js"></script>
</html>
